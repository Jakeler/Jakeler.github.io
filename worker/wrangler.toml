name = "blog-mail"
main = "src/index.js"
compatibility_date = "2026-07-01"

# own subdomain so blog.jklr.org can stay DNS-only to GitHub Pages;
# deploying auto-creates the DNS record. Must be a single-level subdomain:
# the free Universal SSL wildcard doesn't cover e.g. mail.blog.jklr.org
routes = [
  { pattern = "mail-blog.jklr.org", custom_domain = true }
]

[[kv_namespaces]]
binding = "MAIL_KV"
id = "874ef5039df64874baf0bb1078e6b18b"
