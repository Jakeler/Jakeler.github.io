name = "blog-mail"
main = "src/index.js"
compatibility_date = "2026-07-01"

# own subdomain so blog.jklr.org can stay DNS-only to GitHub Pages;
# deploying auto-creates the DNS record and certificate
routes = [
  { pattern = "mail.blog.jklr.org", custom_domain = true }
]

[[kv_namespaces]]
binding = "MAIL_KV"
id = "874ef5039df64874baf0bb1078e6b18b"
