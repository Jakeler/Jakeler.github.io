name = "blog-mail"
main = "src/index.js"
compatibility_date = "2026-07-01"

# requires blog.jklr.org to be proxied (orange cloud) through Cloudflare;
# otherwise deploy on a workers.dev/custom domain and set SITE for CORS
routes = [
  { pattern = "blog.jklr.org/api/*", zone_name = "jklr.org" }
]

[[kv_namespaces]]
binding = "MAIL_KV"
id = "<run: wrangler kv namespace create MAIL_KV>"
