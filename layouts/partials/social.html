<ul class="social">
    {{ with site.Params.mail }}
    <li>
        <a href="mailto:{{ . }}">
            <svg>
                <use href="/static/fontawesome/regular.svg#envelope"></use>
            </svg>
            {{ . }}
        </a>
    </li>
    {{ end }}
    {{ with site.Params.github_username }}
    <li>
        <a href="https://github.com/{{ . }}">
            <svg>
                <use href="/static/fontawesome/brands.svg#github"></use>
            </svg>
            {{ . }}
        </a>
    </li>
    {{ end }}
    <li>
        <a href="/feed.xml">
            <svg>
                <use href="/static/fontawesome/solid.svg#rss"></use>
            </svg>
            RSS
        </a>
    </li>
    <li>
        <a href="https://feedly.com/i/subscription/feed%2Fhttps%3A%2F%2Fblog.jklr.org%2Ffeed.xml" target="blank">
            <img id="feedlyFollow" src="/static/img/feedly-follow-dark.png" alt="follow us in feedly">
        </a>
    </li>
</ul>
